server {
    listen 80;
    listen [::]:80;

    server_name dush.kz www.dush.kz dush.194-238-42-119.sslip.io 194.238.42.119;
    root /var/www/dush.kz/current/web-out;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Product files persist across application releases. PostgreSQL stores only these URLs.
    location ^~ /media/ {
        alias /var/www/dush.kz/shared/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
    }
    charset utf-8;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Без HSTS первый заход по набранному «dush.kz» идёт по http и браузер
    # успевает показать «Не защищено» до редиректа. С заголовком он сразу
    # запрашивает https. Срок 180 дней: если сертификат когда-то не продлится,
    # запрет http снимется быстрее, чем при годовом max-age.
    add_header Strict-Transport-Security "max-age=15552000" always;

    location /_next/static/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:css|js|svg|ico|woff2?|png|jpe?g|webp)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    # Панель управления не индексируется и не кэшируется.
    location /admin {
        try_files $uri.html $uri $uri/ =404;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri.html $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
